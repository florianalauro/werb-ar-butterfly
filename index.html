<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>

    <div id="overlay">
      <div id="status-msg">
        <div class="logo-area">
          <img src="assets/icons/Logo Ondulkart_w.svg" alt="Ondulkart" class="logo-img">
        </div>

        <div class="middle-content">
          <h1 class="main-title">THE LINK</h1> 
          <p class="sub-title"><em>Where Technology meets the Soul of Nature</em></p> 
        </div>

        <div class="button-area">
          <div id="loading-container">
            <div class="spinner"></div>
            <p class="loading-text">Loading Assets...</p>
          </div>
          <button id="btn-start" class="btn-start hidden" onclick="startExperience()">START</button>
        </div>
      </div>

      <div id="calibration-msg" class="hidden">
        <div class="icon-frame"></div>
        <h2>POSITION YOUR DEVICE</h2>
        <p>Keep your phone vertically in front of you</p>
      </div>
    </div>

    <!-- Scena Ibrida: AR.js per compatibilità + WebXR per stabilità Android -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
      renderer="colorManagement: true; antialias: true; logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
      webxr="optionalFeatures: hit-test, local-floor, dom-overlay; overlayElement: #overlay;">
      
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>

      <a-camera id="main-camera" look-controls="enabled: true" position="0 1.6 0"></a-camera>
      <a-entity id="swarm"></a-entity>

      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <a-entity light="type: directional; intensity: 1; position: 1 1 1"></a-entity>
    </a-scene>

    <script src="js/script.js"></script>
  </body>
</html>
