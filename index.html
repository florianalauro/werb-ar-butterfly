<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Farfalle AR/VR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
      /* Nascondiamo il video sorgente dalla pagina */
      #webcam-video {
        display: none;
      }
    </style>
  </head>

  <body>
    <video id="webcam-video" autoplay playsinline></video>

    <div id="overlay">
      <div id="status-msg">
        <div class="logo-area">
          <a href="/">
            <img src="assets/icons/Logo Ondulkart_w.svg" alt="Ondulkart" class="logo-img">
          </a>
        </div>
        <div class="middle-content">
          <h1 class="main-title">THE LINK</h1> 
          <p class="sub-title"><em>Where Technology meets the Soul of Nature</em></p> 
        </div>
        <div class="button-area">
          <button class="btn-start" onclick="startExperience()">START</button>
        </div>
      </div>

      <div id="calibration-msg" class="hidden">
        <div class="icon-frame"></div>
        <h2>POSITION YOUR DEVICE</h2>
        <p>Keep your phone vertically in front of you</p>
      </div>
    </div>

    <a-scene 
      renderer="colorManagement: true; alpha: true;" 
      background="transparent: true;"
      webxr="optionalFeatures: dom-overlay, local-floor; overlayElement: #overlay">
      
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>

      <a-sky id="vr-background" src="#webcam-video" visible="false" rotation="0 -90 0"></a-sky>

      <a-camera id="main-camera" look-controls></a-camera>
      <a-entity id="swarm"></a-entity>

      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <a-entity light="type: directional; intensity: 1; position: 1 1 1"></a-entity>
    </a-scene>

    <script src="js/script.js"></script>
  </body>
</html>
